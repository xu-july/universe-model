<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>宇宙奥秘探索仪 - 终极物理增强版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #030304 !important; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; }
        
        button, input, .pointer-events-auto { pointer-events: auto; touch-action: manipulation; }
        
        .glass-panel { background: rgba(10, 15, 25, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #eab308; cursor: pointer; margin-top: -7px; box-shadow: 0 0 15px rgba(234,179,8,0.8); border: 2px solid white; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.2); border-radius: 2px; }
        
        .epic-btn { background: linear-gradient(135deg, #4f46e5 0%, #db2777 100%); border: none; transition: transform 0.2s, box-shadow 0.2s; }
        .epic-btn:hover { transform: translateY(-2px); box-shadow: 0 0 15px rgba(219,39,119,0.5); }
        .active-mode { box-shadow: 0 0 0 2px #fff, 0 0 20px #db2777 !important; filter: brightness(1.2); }
        
        #teacher-tooltip { transition: opacity 0.4s, transform 0.4s; }
        .tooltip-hidden { opacity: 0; transform: translateY(-20px) translateX(-50%); pointer-events: none; }
        
        .card-transition { transition: opacity 0.3s, transform 0.3s; }
        .card-hidden { opacity: 0; transform: translateY(-50%) translateX(30px); pointer-events: none; }

        .cam-btn { transition: all 0.3s; }
        .cam-btn.active { border-color: #3b82f6; color: #93c5fd; background-color: rgba(59, 130, 246, 0.2); box-shadow: 0 0 10px rgba(59,130,246,0.3) inset; }
        
        @keyframes pulse-glow { 0% { box-shadow: 0 0 10px rgba(234, 179, 8, 0.4); } 50% { box-shadow: 0 0 20px rgba(234, 179, 8, 0.8); } 100% { box-shadow: 0 0 10px rgba(234, 179, 8, 0.4); } }
        .planet-btn-active { animation: pulse-glow 2s infinite; border-color: #eab308 !important; color: #fde047 !important; background: rgba(161, 98, 7, 0.3) !important; }

        #left-panel-wrapper { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
    </style>
</head>
<body class="bg-[#030304] text-white">
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="w-full p-4 z-20 flex justify-between items-start flex-shrink-0 h-20">
            <div class="glass-panel px-4 py-2 rounded-full pointer-events-auto flex gap-3 border border-blue-500/30">
                <span class="text-blue-300 font-bold text-sm hidden sm:inline">坐标系: <span id="frame-status" class="text-white">太阳系全景 (日心说)</span></span>
                <span class="text-gray-400 hidden sm:inline">|</span>
                <span class="text-green-300 font-bold text-sm">目标: <span id="target-status" class="text-white">系统全景</span></span>
                <span class="text-gray-400">|</span>
                <span class="text-purple-300 font-bold text-sm">🗓️ 日期: <span id="date-status" class="text-white w-32 sm:w-36 inline-block">计算中...</span></span>
                <span class="text-gray-400 hidden sm:inline">|</span>
                <span class="text-indigo-300 font-bold text-sm hidden sm:inline">🌔 月相: <span id="moon-phase-status" class="text-white w-24 inline-block">计算中...</span></span>
            </div>
            <button id="btn-fullscreen" class="glass-panel px-4 py-2 rounded-full pointer-events-auto text-white hover:bg-white/10 text-sm transition cursor-pointer">🎦 全屏</button>
        </div>

        <div id="teacher-tooltip" class="absolute top-24 left-1/2 transform -translate-x-1/2 z-40 tooltip-hidden w-11/12 max-w-2xl pointer-events-none">
            <div class="glass-panel p-5 rounded-2xl border-2 border-yellow-500/50 shadow-[0_0_30px_rgba(234,179,8,0.2)] flex gap-4 bg-black/80">
                <div class="text-4xl" id="tt-icon">💡</div>
                <div>
                    <h4 id="tt-title" class="text-yellow-300 font-extrabold text-xl mb-2">系统提示</h4>
                    <p id="tt-desc" class="text-sm text-gray-100 leading-relaxed tracking-wide"></p>
                </div>
            </div>
        </div>

        <div id="planet-info-card" class="absolute top-1/2 right-4 sm:right-10 transform -translate-y-1/2 z-40 card-hidden w-72 pointer-events-auto card-transition">
            <div class="glass-panel p-5 rounded-2xl border-2 border-cyan-500/40 shadow-[0_0_25px_rgba(6,182,212,0.3)] bg-black/90 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-16 h-16 bg-gradient-to-bl from-cyan-500/20 to-transparent rounded-bl-full pointer-events-none"></div>
                <button id="close-planet-card" class="absolute top-3 right-3 text-gray-400 hover:text-white cursor-pointer transition p-1">✖</button>
                <div class="flex items-center gap-2 mb-3">
                    <span class="text-2xl">🪐</span>
                    <h4 id="pic-name" class="text-cyan-300 font-extrabold text-xl tracking-wider">行星名称</h4>
                </div>
                <div class="text-xs text-cyan-100 mb-3 border-b border-gray-700/50 pb-3 flex justify-between">
                    <span>公转周期:</span>
                    <span class="font-mono font-bold text-yellow-400"><span id="pic-period"></span> 地球日</span>
                </div>
                <p id="pic-desc" class="text-sm text-gray-300 leading-relaxed text-justify"></p>
            </div>
        </div>

        <div class="flex-grow relative w-full h-full">
            <div id="left-panel-wrapper" class="absolute top-0 bottom-24 left-0 z-30 flex items-center pl-4 transform translate-x-0">
                <div id="left-panel-content" class="glass-panel rounded-2xl p-4 w-72 sm:w-80 h-full pointer-events-auto overflow-y-auto custom-scroll flex flex-col gap-3 border border-white/10 flex-shrink-0">
                    
                    <div class="bg-indigo-900/30 p-3 rounded-xl border border-indigo-500/30">
                        <h3 class="text-indigo-300 font-bold text-xs mb-2 flex items-center gap-1">📸 智能伴飞镜头</h3>
                        <div class="grid grid-cols-3 gap-2">
                            <button id="cam-system" class="cam-btn active bg-black hover:bg-gray-800 border border-gray-600 text-gray-200 py-1.5 rounded-lg text-xs cursor-pointer">🌌 全景</button>
                            <button id="cam-earth" class="cam-btn bg-black hover:bg-gray-800 border border-gray-600 text-gray-200 py-1.5 rounded-lg text-xs cursor-pointer">🌍 地球</button>
                            <button id="cam-moon" class="cam-btn bg-black hover:bg-gray-800 border border-gray-600 text-gray-200 py-1.5 rounded-lg text-xs cursor-pointer">🌕 月球</button>
                        </div>
                        <div id="planets-ctrl-container" class="mt-2 transition-all duration-300">
                            <button id="btn-toggle-planets" class="w-full bg-gray-900 hover:bg-gray-800 border border-gray-600 text-gray-400 font-bold py-2 px-3 rounded-lg text-xs transition cursor-pointer flex justify-center items-center gap-2">
                                🪐 开启八大行星运行
                            </button>
                        </div>
                    </div>

                    <div class="bg-black/50 p-3 rounded-xl border border-pink-500/30">
                        <h3 class="text-pink-400 font-extrabold text-xs mb-2">⚔️ 宇宙参照系</h3>
                        <div class="grid grid-cols-2 gap-2">
                            <button id="btn-heliocentric" class="epic-btn active-mode text-white font-bold py-1.5 px-2 rounded-lg text-xs cursor-pointer">☀️ 日心说</button>
                            <button id="btn-geocentric" class="bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white font-bold py-1.5 px-2 rounded-lg text-xs transition cursor-pointer">🌍 地心说</button>
                        </div>
                    </div>

                    <div class="bg-purple-900/30 p-3 rounded-xl border border-purple-500/30">
                        <h3 class="text-purple-300 font-bold text-xs mb-2">🌗 罕见食相搜寻仪</h3>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <button id="btn-solar-eclipse" class="bg-black hover:bg-gray-900 border border-gray-500 text-gray-200 font-bold py-1.5 px-1 rounded-lg text-xs transition cursor-pointer">🌑 寻下一次日食</button>
                            <button id="btn-lunar-eclipse" class="bg-red-950 hover:bg-red-900 border border-red-800 text-red-200 font-bold py-1.5 px-1 rounded-lg text-xs transition cursor-pointer">🌕 寻下一次血月</button>
                        </div>
                        <button id="btn-moon-phases" class="w-full bg-indigo-950 hover:bg-indigo-900 border border-indigo-700 text-indigo-200 font-bold py-1.5 px-2 rounded-lg text-xs transition cursor-pointer flex justify-center items-center gap-2">
                            🌖 演示月相盈亏周期
                        </button>
                    </div>

                    <div class="bg-blue-900/30 p-3 rounded-xl border border-blue-500/30 flex-grow flex flex-col">
                        <h3 class="text-blue-300 font-bold text-xs mb-2">🌍 四季与辅助线</h3>
                        
                        <button id="btn-polar-day-night" class="w-full bg-cyan-900/60 hover:bg-cyan-800 border border-cyan-500/50 text-cyan-100 font-bold py-2 px-3 rounded-lg text-xs transition mb-2 flex justify-between items-center cursor-pointer">
                            <span>❄️ 极昼极夜现象</span> <span id="polar-status" class="bg-cyan-950 px-1 rounded text-[10px]">点击切换俯视</span>
                        </button>

                        <button id="btn-toggle-tilt" class="w-full bg-indigo-900/60 hover:bg-indigo-800 border border-indigo-500/50 text-indigo-200 font-bold py-1.5 px-3 rounded-lg text-xs transition mb-2 flex justify-between items-center cursor-pointer">
                            <span>🌎 假设地球直立</span> <span id="tilt-status" class="bg-indigo-950 px-1 rounded text-[10px]">真实 23.5°</span>
                        </button>

                        <div class="grid grid-cols-4 gap-1 mb-2">
                            <button id="btn-toggle-equator" class="bg-green-600 text-white font-bold py-1 px-1 rounded text-[10px] transition border border-green-500/50 cursor-pointer text-center">赤道</button>
                            <button id="btn-toggle-tropics" class="bg-yellow-600 text-white font-bold py-1 px-1 rounded text-[10px] transition border border-yellow-500/50 cursor-pointer text-center">回归线</button>
                            <button id="btn-toggle-polars" class="bg-gray-800 text-gray-400 hover:bg-gray-700 font-bold py-1 px-1 rounded text-[10px] transition border border-gray-600 cursor-pointer text-center">极圈</button>
                            <button id="btn-toggle-terminator" class="bg-gray-800 text-gray-400 hover:bg-gray-700 font-bold py-1 px-1 rounded text-[10px] transition border border-gray-600 cursor-pointer text-center">晨昏线</button>
                        </div>

                        <button id="btn-sunlight" class="w-full bg-yellow-900/50 hover:bg-yellow-800 border border-yellow-500/50 text-yellow-200 font-bold py-1.5 px-3 rounded-lg text-xs transition mb-2 flex justify-between items-center cursor-pointer">
                            <span>☀️ 开启阳光射线</span> <span id="sunlight-status" class="bg-yellow-950 text-yellow-500 px-1 rounded text-[10px]">隐藏</span>
                        </button>

                        <button id="btn-subsolar" class="w-full bg-orange-900/60 hover:bg-orange-800 border border-orange-500/50 text-orange-200 font-bold py-2 px-3 rounded-lg text-xs transition flex justify-center items-center gap-2 mt-auto cursor-pointer shadow-[0_4px_10px_rgba(0,0,0,0.3)]">
                            <span class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_red]"></span> 
                            <span id="subsolar-text" class="tracking-wider">显示直射点与温度场</span>
                        </button>
                    </div>
                </div>

                <button id="btn-toggle-panel" class="pointer-events-auto flex-shrink-0 bg-blue-600/90 hover:bg-blue-500 text-white w-7 h-20 flex items-center justify-center rounded-r-xl border-y border-r border-blue-400/40 cursor-pointer ml-[-1px]">
                    <svg id="panel-arrow" class="w-4 h-4 transform transition-transform pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                </button>
            </div>
        </div>

        <div class="absolute bottom-4 left-4 right-4 sm:left-1/2 sm:transform sm:-translate-x-1/2 sm:w-[800px] z-30 flex-shrink-0 h-20">
            <div class="glass-panel rounded-2xl p-4 pointer-events-auto w-full h-full flex gap-4 items-center bg-black/70 border-t-2 border-orange-500/50">
                <button id="play-btn" class="bg-orange-600 hover:bg-orange-500 w-12 h-12 rounded-full flex items-center justify-center text-xl text-white transition cursor-pointer shadow-[0_0_15px_rgba(234,179,8,0.5)]">⏸</button>
                <div class="flex-grow flex flex-col gap-1">
                    <div class="flex justify-between text-xs text-gray-300">
                        <span class="font-bold flex items-center gap-1">⏱️ 时间流速控制</span>
                        <span id="speed-display" class="font-bold text-orange-400 font-mono w-24 text-right bg-orange-900/30 px-2 py-1 rounded">2.0 天/秒</span>
                    </div>
                    <input type="range" id="speed-slider" min="0" max="30" value="2" step="0.1" class="cursor-pointer">
                </div>
            </div>
        </div>
    </div>

    <script>
        const panelWrapper = document.getElementById('left-panel-wrapper');
        const btnTogglePanel = document.getElementById('btn-toggle-panel');
        const panelArrow = document.getElementById('panel-arrow');
        let isPanelOpen = true;

        const handleTogglePanel = (e) => {
            if (e.type === 'touchstart' && e.cancelable) e.preventDefault(); 
            e.stopPropagation(); 
            isPanelOpen = !isPanelOpen;
            if (isPanelOpen) {
                panelWrapper.style.transform = 'translate3d(0, 0, 0)';
                panelArrow.style.transform = 'rotate(0deg)';
            } else {
                panelWrapper.style.transform = 'translate3d(calc(-100% + 28px), 0, 0)';
                panelArrow.style.transform = 'rotate(180deg)';
            }
        };
        btnTogglePanel.addEventListener('click', handleTogglePanel);
        btnTogglePanel.addEventListener('touchstart', handleTogglePanel, { passive: false });

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x030304);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100000); 
        camera.position.set(0, 800, 2000); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05; controls.minDistance = 3.5; controls.maxDistance = 6000; 

        const clock = new THREE.Clock();
        const textureLoader = new THREE.TextureLoader();
        const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();

        const starsGeo = new THREE.BufferGeometry(); const starsPos = [];
        for(let i=0; i<4000; i++) {
            const r = 3000 + Math.random()*5000, theta = 2*Math.PI*Math.random(), phi = Math.acos(2*Math.random()-1);
            starsPos.push(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi));
        }
        starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsPos, 3));
        scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({color:0xffffff, size:1.2, transparent:true, opacity:0.8})));
        
        scene.add(new THREE.AmbientLight(0x111118, 0.2)); 
        const sunLight = new THREE.PointLight(0xffeedd, 1.0, 6000); scene.add(sunLight);
        
        const shadowLight = new THREE.DirectionalLight(0xffffff, 4.0);
        shadowLight.castShadow = true; 
        shadowLight.shadow.mapSize.width = 2048; 
        shadowLight.shadow.mapSize.height = 2048;
        shadowLight.shadow.camera.near = 0.5; shadowLight.shadow.camera.far = 800;
        shadowLight.shadow.camera.left = -30; shadowLight.shadow.camera.right = 30;
        shadowLight.shadow.camera.top = 30; shadowLight.shadow.camera.bottom = -30;
        shadowLight.shadow.bias = -0.0005; shadowLight.shadow.radius = 4;
        scene.add(shadowLight);

        const SUN_RADIUS = 30; const R_EARTH = 3; const DIST_EARTH = 200; const DIST_MOON = R_EARTH * 6; 
        const INCLINATION = 20 * Math.PI / 180; 

        const sunGroup = new THREE.Group(); scene.add(sunGroup);

        const sunVertexShader = `varying vec2 vUv; varying vec3 vPosition; varying vec3 vNormal; varying vec3 vViewPosition; void main() { vUv = uv; vPosition = position; vNormal = normalize(normalMatrix * normal); vec4 mvPosition = modelViewMatrix * vec4(position, 1.0); vViewPosition = -mvPosition.xyz; gl_Position = projectionMatrix * mvPosition; }`;
        const sunFragmentShader = `
            uniform float time; varying vec2 vUv; varying vec3 vPosition; varying vec3 vNormal; varying vec3 vViewPosition;
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; } vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); } vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            float snoise(vec3 v) {
                const vec2  C = vec2(1.0/6.0, 1.0/3.0); const vec4  D = vec4(0.0, 0.5, 1.0, 2.0); vec3 i  = floor(v + dot(v, C.yyy) ); vec3 x0 = v - i + dot(i, C.xxx) ; vec3 g = step(x0.yzx, x0.xyz); vec3 l = 1.0 - g; vec3 i1 = min( g.xyz, l.zxy ); vec3 i2 = max( g.xyz, l.zxy ); vec3 x1 = x0 - i1 + C.xxx; vec3 x2 = x0 - i2 + C.yyy; vec3 x3 = x0 - D.yyy; i = mod289(i); vec4 p = permute( permute( permute( i.z + vec4(0.0, i1.z, i2.z, 1.0 )) + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) + i.x + vec4(0.0, i1.x, i2.x, 1.0 )); float n_ = 0.142857142857; vec3  ns = n_ * D.wyz - D.xzx; vec4 j = p - 49.0 * floor(p * ns.z * ns.z); vec4 x_ = floor(j * ns.z); vec4 y_ = floor(j - 7.0 * x_ ); vec4 x = x_ *ns.x + ns.yyyy; vec4 y = y_ *ns.x + ns.yyyy; vec4 h = 1.0 - abs(x) - abs(y); vec4 b0 = vec4( x.xy, y.xy ); vec4 b1 = vec4( x.zw, y.zw ); vec4 s0 = floor(b0)*2.0 + 1.0; vec4 s1 = floor(b1)*2.0 + 1.0; vec4 sh = -step(h, vec4(0.0)); vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ; vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ; vec3 p0 = vec3(a0.xy,h.x); vec3 p1 = vec3(a0.zw,h.y); vec3 p2 = vec3(a1.xy,h.z); vec3 p3 = vec3(a1.zw,h.w); vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3))); p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w; vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0); m = m * m; return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }
            float fbm(vec3 p) { float f = 0.0; float w = 0.5; for (int i = 0; i < 5; i++) { f += w * snoise(p); p *= 2.0; w *= 0.5; } return f; }
            void main() {
                vec3 p = vPosition * 0.06; float noiseVal = fbm(p + time * 0.3); vec3 col1 = vec3(0.5, 0.0, 0.0); vec3 col2 = vec3(1.0, 0.3, 0.0); vec3 col3 = vec3(1.0, 0.8, 0.2); vec3 col4 = vec3(1.0, 1.0, 0.9); vec3 color = mix(col1, col2, smoothstep(-0.5, 0.1, noiseVal)); color = mix(color, col3, smoothstep(0.1, 0.5, noiseVal)); color = mix(color, col4, smoothstep(0.5, 1.0, noiseVal)); vec3 normal = normalize(vNormal); vec3 viewDir = normalize(vViewPosition); float fresnel = dot(normal, viewDir); fresnel = clamp(1.0 - fresnel, 0.0, 1.0); fresnel = pow(fresnel, 3.0); color += vec3(1.0, 0.6, 0.1) * fresnel * 1.5; gl_FragColor = vec4(color, 1.0);
            }
        `;
        const sunShaderMaterial = new THREE.ShaderMaterial({ vertexShader: sunVertexShader, fragmentShader: sunFragmentShader, uniforms: { time: { value: 0.0 } } });
        const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(SUN_RADIUS, 64, 64), sunShaderMaterial); sunGroup.add(sunMesh);

        const glowCanvas = document.createElement('canvas'); glowCanvas.width = 512; glowCanvas.height = 512; const glowCtx = glowCanvas.getContext('2d');
        const glowGrad = glowCtx.createRadialGradient(256, 256, SUN_RADIUS*0.8, 256, 256, 256);
        glowGrad.addColorStop(0, 'rgba(255, 255, 255, 1)'); glowGrad.addColorStop(0.1, 'rgba(255, 200, 50, 0.8)'); glowGrad.addColorStop(0.3, 'rgba(255, 100, 0, 0.4)'); glowGrad.addColorStop(0.6, 'rgba(150, 0, 0, 0.1)'); glowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        glowCtx.fillStyle = glowGrad; glowCtx.fillRect(0, 0, 512, 512);

        function findNextEclipseTime(startTime, isLunar) {
            let t = startTime + 2;

            const ePos = new THREE.Vector3();

            const mWorldPos = new THREE.Vector3();
            const dirS2E = new THREE.Vector3();
            const dirE2M = new THREE.Vector3();
            const dirS2M = new THREE.Vector3();
            const dirM2E = new THREE.Vector3();
            const proj = new THREE.Vector3();
            const axisX = new THREE.Vector3(1, 0, 0);
            const axisY = new THREE.Vector3(0, 1, 0);

            for(let i=0; i<36500; i++) { 
                t += dt;
                const eAng = (t / 365.25) * Math.PI * 2;
                ePos.set(Math.cos(eAng)*DIST_EARTH, 0, -Math.sin(eAng)*DIST_EARTH);
                
                const nodeAngle = -(t / 6793) * Math.PI * 2;
                const mAng = (t / 27.32) * Math.PI * 2;
                mLocalPos.set(Math.cos(mAng)*DIST_MOON, 0, -Math.sin(mAng)*DIST_MOON);
                mLocalPos.applyAxisAngle(axisX, INCLINATION);
                mLocalPos.applyAxisAngle(axisY, nodeAngle);
                mWorldPos.addVectors(ePos, mLocalPos);
                
                if (isLunar) {
                    dirS2E.copy(ePos).normalize(); 
                    dirE2M.subVectors(mWorldPos, ePos);
                    const dot = dirE2M.dot(dirS2E);
                    if (dot > 0) { 
                        proj.copy(dirS2E).multiplyScalar(dot); 
                        const perpDist = dirE2M.subVectors(dirE2M, proj).length();
                        if (perpDist < R_EARTH * 0.8) return t - 0.8; 
                    }
                } else {
                    dirS2M.copy(mWorldPos).normalize(); 
                    dirM2E.subVectors(ePos, mWorldPos);
                    const dot = dirM2E.dot(dirS2M);
                    if (dot > 0) { 
                        proj.copy(dirS2M).multiplyScalar(dot); 
                        const perpDist = dirM2E.subVectors(dirM2E, proj).length();
                        if (perpDist < R_EARTH * 0.4) return t - 0.8; 
                    }
                }
            }
            return startTime; 
        }

            focusCameraOn('moon'); 
            isTrackingPhase = true; // 开启动态引力锁死
            
            // 彻底禁用鼠标的旋转和平移，严防用户手动偏离观测轴线！但依然保留缩放功能
            controls.enableRotate = false; 
            controls.enablePan = false; 
            
            timeSpeed = 1.0; speedSlider.value = 1.0; speedDisplay.innerText = `1.0 天/秒`;
            isPlaying = true; document.getElementById('play-btn').innerHTML = '⏸';
            updateTooltip("🌖 演示月相盈亏周期", "视野已强制绝对锁定为【背靠地球，直视月球】的连线！请注意：现在鼠标已无法旋转视角（但支持滚轮缩放）。你会看到极其完美的月相渐变！", "🔭");
        });

        let polarViewMode = 0; 
        document.getElementById('btn-polar-day-night').addEventListener('click', () => {
            polarViewMode = (polarViewMode + 1) % 3; const btnSpan = document.getElementById('polar-status');
            if (polarViewMode === 1) { 
                if(!showPolars) document.getElementById('btn-toggle-polars').click(); if(!showTerminator) document.getElementById('btn-toggle-terminator').click();
                if(!isEarthTilted) document.getElementById('btn-toggle-tilt').click(); if(!isShowSunlight) document.getElementById('btn-sunlight').click();
                timeDays = 365.25 * 0.5; setObservationMode(0.05, 'earth', new THREE.Vector3(12, 27.5, 0)); 
                btnSpan.innerText = "北极俯视"; btnSpan.className = "bg-blue-600 text-white px-1 rounded text-[10px]";
            } else if (polarViewMode === 2) { 
                if(!showPolars) document.getElementById('btn-toggle-polars').click(); if(!showTerminator) document.getElementById('btn-toggle-terminator').click();
                if(!isEarthTilted) document.getElementById('btn-toggle-tilt').click();
                timeDays = 0; setObservationMode(0.05, 'earth', new THREE.Vector3(-12, -27.5, 0)); 
                btnSpan.innerText = "南极俯视"; btnSpan.className = "bg-red-600 text-white px-1 rounded text-[10px]";
            } else { 
                setObservationMode(2.0, 'earth'); btnSpan.innerText = "点击切换俯视"; btnSpan.className = "bg-cyan-950 px-1 rounded text-[10px]";
            }
        });

        const setRefFrame = (frame) => {
            if(refFrame === frame) return; refFrame = frame; 
            sunTrailPoints.length = 0; sunTrailLine.geometry.setFromPoints([]);
            planetsData.forEach(item => { item.trailPoints.length = 0; item.trailLine.geometry.setFromPoints([]); item.baseOrbit.visible = (frame === 'heliocentric'); });
            const btnHelio = document.getElementById('btn-heliocentric'), btnGeo = document.getElementById('btn-geocentric');
            if(frame === 'heliocentric') {
                btnHelio.className = 'epic-btn active-mode text-white font-bold py-1.5 px-2 rounded-lg text-xs cursor-pointer'; btnGeo.className = 'bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white font-bold py-1.5 px-2 rounded-lg text-xs transition cursor-pointer';
                document.getElementById('frame-status').innerText = '太阳系全景 (日心说)'; earthOrbit.visible = true; focusCameraOn('system');
            } else {
                btnGeo.className = 'epic-btn active-mode text-white font-bold py-1.5 px-2 rounded-lg text-xs cursor-pointer'; btnHelio.className = 'bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white font-bold py-1.5 px-2 rounded-lg text-xs transition cursor-pointer';
                document.getElementById('frame-status').innerText = '人类视角 (地心说)'; earthOrbit.visible = false; focusCameraOn('earth', new THREE.Vector3(0, 400, 800));
            }
        };
        document.getElementById('btn-heliocentric').addEventListener('click', () => setRefFrame('heliocentric'));
        document.getElementById('btn-geocentric').addEventListener('click', () => setRefFrame('geocentric'));

        focusCameraOn('system'); updateTooltip("系统启动成功", "全网最硬核的天体物理引擎现已就绪。可任意切换模式进行高精度观测！", "🌌");

        let lastDateString = ""; let lastPhaseString = "";
        const solarTerms = ["冬至", "小寒", "大寒", "立春", "雨水", "惊蛰", "春分", "清明", "谷雨", "立夏", "小满", "芒种", "夏至", "小暑", "大暑", "立秋", "处暑", "白露", "秋分", "寒露", "霜降", "立冬", "小雪", "大雪"];

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            sunShaderMaterial.uniforms.time.value += delta;
            innerGlow.material.rotation += delta * 0.1; outerGlow.material.rotation -= delta * 0.05;

            if (isPlaying) {
                timeDays += timeSpeed * delta; 
                if (Math.abs(earthTiltGroup.rotation.z - targetTilt) > 0.001) earthTiltGroup.rotation.z += (targetTilt - earthTiltGroup.rotation.z) * 0.1; else earthTiltGroup.rotation.z = targetTilt;

                const eAng = (timeDays / 365.25) * Math.PI * 2;
                const baseDate = new Date(2023, 11, 22);
                const currentDate = new Date(baseDate.getTime() + timeDays * 24 * 60 * 60 * 1000);
                const month = currentDate.getMonth() + 1; const date = currentDate.getDate();
                const degree = ((timeDays / 365.25) * 360 % 360 + 360) % 360;
                const termIndex = Math.floor(degree / 15);
                const newDateString = `${month}月${date}日 [${solarTerms[termIndex]}]`;
                if (newDateString !== lastDateString) { document.getElementById('date-status').innerText = newDateString; lastDateString = newDateString; }

                const ePosAbs = new THREE.Vector3(Math.cos(eAng)*DIST_EARTH, 0, -Math.sin(eAng)*DIST_EARTH);
                if (refFrame === 'heliocentric') { sunGroup.position.set(0,0,0); earthPosGroup.position.copy(ePosAbs); } 
                else { earthPosGroup.position.set(0,0,0); sunGroup.position.copy(ePosAbs).negate(); }

                sunLight.position.copy(sunGroup.position);
                shadowLight.position.copy(sunGroup.position); shadowLight.target.position.copy(earthPosGroup.position); shadowLight.target.updateMatrixWorld();
                if (showTerminator) terminatorMesh.lookAt(sunGroup.position);

                lunarNodeGroup.rotation.y = -(timeDays / 6793) * Math.PI * 2;
                const mAng = (timeDays / 27.32) * Math.PI * 2;
                moonMesh.position.set(Math.cos(mAng)*DIST_MOON, 0, -Math.sin(mAng)*DIST_MOON);
                moonMesh.rotation.y = mAng + Math.PI / 2;
                
                const sPos = sunGroup.position; const ePos = earthPosGroup.position; const mWorldPos = moonMesh.getWorldPosition(new THREE.Vector3());
                const sToEDir = ePos.clone().sub(sPos).normalize(); const eToM = mWorldPos.clone().sub(ePos);
                const dotProduct = eToM.dot(sToEDir);
                
                if (dotProduct > 0) {
                    const proj = sToEDir.clone().multiplyScalar(dotProduct); 
                    const perpDist = eToM.clone().sub(proj).length();
                    if (perpDist < R_EARTH * 1.2) {
                        const intensity = 1.0 - Math.min(perpDist / (R_EARTH * 1.2), 1.0);
                        moonMat.emissive.setHex(0x660505); 
                        moonMat.emissiveIntensity = 0.85 * intensity;
                    } else {
                        moonMat.emissive.setHex(0x000000); 
                        moonMat.emissiveIntensity = 0;
                    }
                } else { 
                    moonMat.emissive.setHex(0x000000); 
                    moonMat.emissiveIntensity = 0; 
                }

                // 月相文字的物理计算完全正确！在强制锁定机位后，画面与文字将会完美匹配！
                const e2s = new THREE.Vector3().subVectors(sunGroup.position, earthPosGroup.position).setY(0).normalize();
                const e2m = new THREE.Vector3().subVectors(mWorldPos, earthPosGroup.position).setY(0).normalize();
                let phaseAngle = Math.atan2(e2s.clone().cross(e2m).y, e2s.dot(e2m));
                if (phaseAngle < 0) phaseAngle += Math.PI * 2;
                const phaseDegree = phaseAngle * 180 / Math.PI;

                let phaseName = ""; let phaseIcon = "";
                if (phaseDegree < 22.5 || phaseDegree >= 337.5) { phaseName = "新月(朔)"; phaseIcon = "🌑"; }
                else if (phaseDegree < 67.5) { phaseName = "蛾眉月"; phaseIcon = "🌒"; }
                else if (phaseDegree < 112.5) { phaseName = "上弦月"; phaseIcon = "🌓"; }
                else if (phaseDegree < 157.5) { phaseName = "盈凸月"; phaseIcon = "🌔"; }
                else if (phaseDegree < 202.5) { phaseName = "满月(望)"; phaseIcon = "🌕"; }
                else if (phaseDegree < 247.5) { phaseName = "亏凸月"; phaseIcon = "🌖"; }
                else if (phaseDegree < 292.5) { phaseName = "下弦月"; phaseIcon = "🌗"; }
                else { phaseName = "残月"; phaseIcon = "🌘"; }

                const newPhaseString = `${phaseIcon} ${phaseName}`;
                if (newPhaseString !== lastPhaseString) { document.getElementById('moon-phase-status').innerText = newPhaseString; lastPhaseString = newPhaseString; }

                earthMesh.rotation.y = timeDays * Math.PI * 2 + eAng; cloudMesh.rotation.y = timeDays * Math.PI * 2 * 1.03 + eAng;

                if (isShowSubsolar) {
                    const sunPosLocal = earthMesh.worldToLocal(sunGroup.position.clone()).normalize();
                    subsolarMarker.position.copy(sunPosLocal.clone().multiplyScalar(R_EARTH * 1.02));
                    heatmapMaterial.uniforms.localSunDir.value.copy(sunPosLocal);
                }

                if (isShowSunlight) {
                    const dirToEarth = new THREE.Vector3().subVectors(earthPosGroup.position, sunGroup.position).normalize();
                    const upVec = new THREE.Vector3(0, 1, 0); if (Math.abs(dirToEarth.y) > 0.99) upVec.set(1, 0, 0); 
                    const rightVec = new THREE.Vector3().crossVectors(dirToEarth, upVec).normalize();
                    const realUpVec = new THREE.Vector3().crossVectors(rightVec, dirToEarth).normalize();
                    const spread = R_EARTH * 1.2; const basePos = dirToEarth.clone().multiplyScalar(-R_EARTH * 5); 
                    sunArrows[0].position.copy(basePos); sunArrows[0].setDirection(dirToEarth);
                    sunArrows[1].position.copy(basePos).add(rightVec.clone().multiplyScalar(spread)); sunArrows[1].setDirection(dirToEarth);
                    sunArrows[2].position.copy(basePos).add(rightVec.clone().multiplyScalar(-spread)); sunArrows[2].setDirection(dirToEarth);
                    sunArrows[3].position.copy(basePos).add(realUpVec.clone().multiplyScalar(spread)); sunArrows[3].setDirection(dirToEarth);
                    sunArrows[4].position.copy(basePos).add(realUpVec.clone().multiplyScalar(-spread)); sunArrows[4].setDirection(dirToEarth);
                }
                
                if (sunTrailPoints.length === 0 || sunTrailPoints[sunTrailPoints.length-1].distanceTo(sunGroup.position) > 2) {
                    sunTrailPoints.push(sunGroup.position.clone()); if (sunTrailPoints.length > 1000) sunTrailPoints.shift(); sunTrailLine.geometry.setFromPoints(sunTrailPoints);
                }

                if (isPlanetsEnabled) {
                    planetsData.forEach(item => {
                        const angle = (timeDays / item.config.period) * Math.PI * 2;
                        item.mesh.position.set(Math.cos(angle) * item.config.dist, 0, -Math.sin(angle) * item.config.dist); item.mesh.rotation.y += 0.01; 
                        const worldPos = new THREE.Vector3(); item.mesh.getWorldPosition(worldPos); 
                        if (item.trailPoints.length === 0 || item.trailPoints[item.trailPoints.length-1].distanceTo(worldPos) > 3) {
                            item.trailPoints.push(worldPos); if (item.trailPoints.length > 1500) item.trailPoints.shift(); item.trailLine.geometry.setFromPoints(item.trailPoints);
                        }
                    });
                }
            }

            const currentTargetWorldPos = getTargetWorldPosition(currentTrackingTarget);
            
            if (isCameraTransitioning) {
                // 🚀 在飞行动画期间：实时修正落点，确保它直接落在地球-月球的直线上
                if (isTrackingPhase) {
                    const ePos = earthPosGroup.position;
                    const mPos = moonMesh.getWorldPosition(new THREE.Vector3());
                    const dirM2E = new THREE.Vector3().subVectors(ePos, mPos).normalize();
                    targetEndTargetPos.copy(mPos);
                    targetEndCamPos.copy(mPos).add(dirM2E.multiplyScalar(12)); 
                }
                
                transitionProgress += delta * 1.5; 
                if (transitionProgress >= 1) { transitionProgress = 1; isCameraTransitioning = false; controls.enabled = true; lastTargetWorldPos.copy(currentTargetWorldPos); }
                const easeOutQuart = 1 - Math.pow(1 - transitionProgress, 4);
                const dynamicEndCamPos = targetEndCamPos.clone().add(currentTargetWorldPos.clone().sub(targetEndTargetPos));
                camera.position.lerpVectors(transitionStartCamPos, dynamicEndCamPos, easeOutQuart);
                controls.target.lerpVectors(transitionStartTargetPos, currentTargetWorldPos, easeOutQuart);
                
                controls.update(); 
            } else {
                const posDelta = currentTargetWorldPos.clone().sub(lastTargetWorldPos);
                controls.target.add(posDelta); 
                camera.position.add(posDelta); 
                lastTargetWorldPos.copy(currentTargetWorldPos);
                
                controls.update(); // 让 OrbitControls 处理正常的阻尼和用户滚轮缩放计算
                
                // 🚀 核心强制接管代码：在 OrbitControls 算完之后，立刻夺取权限，强制将摄像机钉死在观测射线上！
                if (isTrackingPhase) {
                    const ePos = earthPosGroup.position;
                    const mPos = moonMesh.getWorldPosition(new THREE.Vector3());
                    // 取出此时地球向月球的绝对方向向量
                    const dirM2E = new THREE.Vector3().subVectors(ePos, mPos).normalize();
                    // 提取用户当前的缩放距离
                    const dist = camera.position.distanceTo(controls.target);
                    // 强制覆盖摄像机的世界坐标（将其移到月球正前方，背对地球）
                    camera.position.copy(mPos).add(dirM2E.multiplyScalar(dist));
                    // 强制相机注视月球！
                    camera.lookAt(mPos);
                    // 同步控件焦点，防止出现异常拉扯
                    controls.target.copy(mPos);
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
